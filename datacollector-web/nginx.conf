server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para a API (evita CORS no Docker)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy para o trigger do Worker
    location /trigger {
        proxy_pass http://worker:5001/trigger;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
